services:
  - type: worker
    name: alphogenai-worker
    env: python
    region: oregon
    buildCommand: pip install -r workers/requirements.txt
    startCommand: python start_render_worker.py
    plan: free
    autoDeploy: true
    branch: main
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RUNWAY_API_KEY
        sync: false
      - key: RUNWAY_API_BASE
        value: https://api.dev.runwayml.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: QWEN_MOCK_ENABLED
        value: false
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: MAX_RETRIES
        value: 3
      - key: RETRY_DELAY
        value: 5
      - key: JOB_TIMEOUT
        value: 3600
      - key: POLL_INTERVAL
        value: 10
